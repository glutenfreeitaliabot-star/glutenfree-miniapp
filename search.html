<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Glutenfree bot — Ricerca</title>
  <meta name="theme-color" content="#0f766e" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg:#f4fbfa; --surface:#fff; --text:#0f172a; --muted:#64748b; --line:#dbe7e5;
      --brand:#14b8a6; --brand-dark:#0f766e; --brand-2:#22c55e; --shadow:0 20px 40px rgba(15,23,42,.08);
      --safe-top:env(safe-area-inset-top); --safe-bottom:env(safe-area-inset-bottom);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0}
    body{
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(34,197,94,.16), transparent 22%),
        radial-gradient(circle at 90% 12%, rgba(6,182,212,.12), transparent 20%),
        linear-gradient(180deg, #f4fbfa, #f8fbff 38%, #f7fffd 100%);
      min-height:100vh;
    }
    .app{width:100%;max-width:820px;margin:0 auto;min-height:100vh;padding:calc(var(--safe-top) + 14px) 14px calc(var(--safe-bottom) + 20px)}
    .glass{background:rgba(255,255,255,.78);backdrop-filter: blur(20px);border:1px solid rgba(255,255,255,.7);box-shadow:var(--shadow)}
    .topbar{position:sticky;top:0;z-index:20;padding-bottom:12px;background:linear-gradient(180deg, rgba(244,251,250,.92), rgba(244,251,250,.55), transparent)}
    .topbar-card{border-radius:26px;padding:14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .left{display:flex;align-items:center;gap:12px}
    .back{width:44px;height:44px;border:none;border-radius:999px;background:#fff;box-shadow:0 10px 18px rgba(15,23,42,.06);cursor:pointer;font-size:18px;color:var(--brand-dark)}
    .title{font-size:24px;font-weight:900;letter-spacing:-.03em}
    .sub{color:var(--muted);font-size:13px;margin-top:4px}
    .search-card{margin-top:14px;border-radius:28px;padding:18px}
    .search-bar{display:flex;gap:10px;align-items:center;background:#fff;padding:10px;border-radius:22px;box-shadow:0 14px 24px rgba(15,23,42,.06)}
    .search-bar input{flex:1;border:none;outline:none;background:transparent;font-size:16px;font-weight:600}
    .search-bar button{border:none;border-radius:16px;padding:12px 16px;background:linear-gradient(135deg, var(--brand-dark), var(--brand));color:#fff;font-weight:900;cursor:pointer}
    .toolbar{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap}
    .chip{border:none;padding:10px 14px;border-radius:999px;background:#fff;color:var(--muted);font-weight:800;cursor:pointer;box-shadow:0 10px 18px rgba(15,23,42,.04)}
    .chip.active{background:linear-gradient(135deg, var(--brand-dark), var(--brand));color:#fff}
    .summary{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:20px;padding:0 4px}
    .summary h2{margin:0;font-size:22px;font-weight:900;letter-spacing:-.03em}
    .summary p{margin:4px 0 0;color:var(--muted);font-size:14px}
    .sort{border:none;background:#fff;border-radius:999px;padding:10px 14px;font-weight:800;color:var(--brand-dark);box-shadow:0 10px 18px rgba(15,23,42,.04);cursor:pointer}
    .cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:14px}
    .restaurant{background:#fff;border-radius:24px;overflow:hidden;border:1px solid #edf3f3;box-shadow:var(--shadow)}
    .hero{position:relative;height:170px;background:linear-gradient(135deg, #14b8a6, #06b6d4 50%, #22c55e)}
    .hero img{width:100%;height:100%;object-fit:cover;mix-blend-mode:soft-light;opacity:.86}
    
    .body{padding:16px}
    .head{display:flex;justify-content:space-between;gap:12px;align-items:start}
    .name{margin:0;font-size:22px;font-weight:900;letter-spacing:-.03em;line-height:1.05}
    .score{background:#fffbeb;color:#92400e;border-radius:16px;padding:10px 12px;font-weight:900;min-width:72px;text-align:center}
    .score small{display:block;font-size:11px;opacity:.7}
    .meta{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
    .meta span{padding:9px 11px;border-radius:999px;background:#f8fafc;color:var(--muted);font-size:13px;font-weight:700;border:1px solid #edf2f7}
    .desc{margin:12px 0 0;color:#475569;font-size:14px;line-height:1.5}
    .foot{margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:12px}
    .foot small{color:var(--muted);font-weight:700}
    .cta{border:none;border-radius:16px;background:linear-gradient(135deg, var(--brand-dark), var(--brand));color:#fff;font-weight:900;padding:12px 15px;cursor:pointer}
    .empty{background:#fff;border-radius:24px;padding:30px 20px;text-align:center;color:var(--muted);box-shadow:var(--shadow);border:1px solid #edf3f3;grid-column:1/-1}
    .toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:24px;background:#0f172a;color:#fff;padding:12px 14px;border-radius:16px;opacity:0;pointer-events:none;transition:all .2s ease;z-index:60;font-weight:700}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    
    .modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;place-items:center;z-index:40;padding:16px}
    .modal-backdrop.show{display:grid}
    .modal{width:min(520px,100%);background:#fff;border-radius:28px;padding:22px;box-shadow:0 30px 56px rgba(15,23,42,.18)}
    .modal h3{margin:0;font-size:28px;line-height:1.05;letter-spacing:-.04em}
    .modal p{color:#475569;line-height:1.5;margin:12px 0 0}
    .modal-actions{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}
    .secondary{border:none;border-radius:16px;padding:13px 16px;background:#eff6ff;color:#1d4ed8;font-weight:900;cursor:pointer}#detailsBody p{margin:10px 0;color:#475569;line-height:1.5}#detailsBody a{color:var(--brand-dark);font-weight:800;text-decoration:none}

    @media (max-width: 860px){.cards{grid-template-columns:1fr}}
    @media (max-width:560px){.search-bar{flex-wrap:wrap}.search-bar button{width:100%}.head{flex-direction:column}.score{min-width:0}}
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbar-card glass">
        <div class="left">
          <button class="back" id="backBtn">←</button>
          <div>
            <div class="title">Glutenfree bot</div>
            <div class="sub" id="subline">Ricerca professionale ristoranti gluten free</div>
          </div>
        </div>
        <button class="sort" id="sortBtn">Top rated</button>
      </div>
    </div>

    <section class="search-card glass">
      <div class="search-bar">
        <input id="searchInput" placeholder="Cerca città, zona o ristorante..." />
        <button id="searchBtn">Cerca</button>
      </div>

      <div class="toolbar">
        <button class="chip active" data-cat="all">Tutti</button>
        <button class="chip" data-cat="Pizzeria">Pizzeria</button>
        <button class="chip" data-cat="Bakery">Bakery</button>
        <button class="chip" data-cat="Bistrot">Bistrot</button>
        <button class="chip" data-cat="Caffè">Caffè</button>
        <button class="chip" id="nearbyBtn">📍 Vicino a me</button>
      </div>
    </section>

    <div class="summary">
      <div>
        <h2 id="resultsTitle">Risultati ricerca</h2>
        <p id="resultsSub">Una pagina dedicata, finalmente. Non tutto schiacciato nella home.</p>
      </div>
    </div>

    <div class="cards" id="results"></div>
  </div>

  <div class="modal-backdrop" id="premiumModal">
    <div class="modal">
      <h3>Premium richiesto</h3>
      <p>La lettura dei dettagli completi dei ristoranti è disponibile solo per utenti premium attivi.</p>
      <div class="modal-actions">
        <button class="cta" id="continuePremium">Passa a Premium</button>
        <button class="secondary" id="closePremiumModal">Chiudi</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="detailsModal">
    <div class="modal">
      <h3 id="detailsTitle">Dettagli ristorante</h3>
      <div id="detailsBody"></div>
      <div class="modal-actions">
        <button class="secondary" id="closeDetailsModal">Chiudi</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>

const API_BASE = "https://glutenfree-bot-184042068933.europe-west1.run.app";
const API_SEARCH = API_BASE + "/api/restaurants/search";
const API_NEARBY = API_BASE + "/api/restaurants/nearby";
const API_ME = API_BASE + "/api/me";
const tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;

let premiumLink = "";
let userIsPremium = false;
let meState = { user_id: 0, is_admin: false, is_premium: false, quota: null };
let currentCategory = "all";
let sortDesc = true;
const params = new URLSearchParams(window.location.search);
const initialQuery = params.get("q") || "";
const initialMode = params.get("mode") || "";

const fallbackRestaurants = [
  { id: 1, name: "Rose Bakery", city: "Milano", rating: 4.8, types: "Bakery", note: "Ambiente fresco, brunch curato e opzioni gluten free ben comunicate.", image: foodIllustration("#14b8a6", "#06b6d4", "bakery") },
  { id: 2, name: "Pizza Nuvola", city: "Bologna", rating: 4.9, types: "Pizzeria", note: "Impasti dedicati e promessa gluten free molto chiara.", image: foodIllustration("#22c55e", "#14b8a6", "pizza") },
  { id: 3, name: "Verde e Grano", city: "Roma", rating: 4.7, types: "Bistrot", note: "Piatti stagionali e look professionale.", image: foodIllustration("#0ea5e9", "#14b8a6", "bowl") },
  { id: 4, name: "Caffè Quercia", city: "Torino", rating: 4.6, types: "Caffè", note: "Colazioni semplici, chiare e credibili.", image: foodIllustration("#14b8a6", "#84cc16", "coffee") }
];

function byId(id){ return document.getElementById(id); }
function qsa(selector){ return Array.from(document.querySelectorAll(selector)); }

function foodIllustration(c1, c2, type){
  const icon = {
    bakery: `<rect x="120" y="86" width="120" height="70" rx="32" fill="rgba(255,255,255,.95)"/><circle cx="148" cy="108" r="6" fill="#d97706"/><circle cx="176" cy="102" r="8" fill="#d97706"/><circle cx="205" cy="108" r="7" fill="#d97706"/>`,
    pizza: `<circle cx="180" cy="112" r="54" fill="#fde68a"/><path d="M180 58L226 144H134L180 58Z" fill="#f97316"/><circle cx="180" cy="106" r="6" fill="#b91c1c"/><circle cx="166" cy="120" r="6" fill="#b91c1c"/><circle cx="194" cy="120" r="6" fill="#b91c1c"/>`,
    bowl: `<circle cx="180" cy="118" r="52" fill="rgba(255,255,255,.95)"/><path d="M130 118c0 30 22 54 50 54s50-24 50-54" fill="#10b981"/><circle cx="161" cy="104" r="10" fill="#f59e0b"/><circle cx="199" cy="102" r="11" fill="#22c55e"/><circle cx="180" cy="90" r="9" fill="#ef4444"/>`,
    coffee: `<rect x="140" y="82" width="84" height="74" rx="18" fill="rgba(255,255,255,.95)"/><path d="M224 96h12c12 0 20 8 20 20s-8 20-20 20h-12" stroke="rgba(255,255,255,.95)" stroke-width="10" fill="none"/><path d="M164 70c-10 12-2 16-2 24" stroke="rgba(255,255,255,.92)" stroke-width="7" stroke-linecap="round"/><path d="M192 70c-10 12-2 16-2 24" stroke="rgba(255,255,255,.92)" stroke-width="7" stroke-linecap="round"/>`
  }[type];
  return `data:image/svg+xml;utf8,${encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 180">
      <defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient></defs>
      <rect width="360" height="180" fill="url(#g)"/>
      <circle cx="60" cy="34" r="22" fill="rgba(255,255,255,.14)"/>
      <circle cx="300" cy="34" r="36" fill="rgba(255,255,255,.12)"/>
      <circle cx="290" cy="150" r="28" fill="rgba(255,255,255,.14)"/>
      ${icon}
    </svg>
  `)}`;
}

function escapeHtml(str){
  return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

function showToast(message){
  const toast = byId("toast");
  if (!toast) return;
  toast.textContent = message;
  toast.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove("show"), 1800);
}

function formatRating(value){
  if (value === null || value === undefined || value === "") return "—";
  return Number(value).toFixed(1);
}

async function loadPremiumLink(){
  try{
    const res = await fetch(`${API_BASE}/api/premium-link`);
    const data = await res.json();
    premiumLink = data.premium_bot_link || "";
  }catch(e){}
}

async function loadQuotaStatus(){
  try{
    const initData = tg && tg.initData ? tg.initData : "";
    const userId = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "";
    const res = await fetch(`${API_BASE}/api/quota?init_data=${encodeURIComponent(initData)}&user_id=${encodeURIComponent(userId)}`);
    const data = await res.json();
    userIsPremium = !!data.is_premium;
    meState.quota = data;
  }catch(e){}
}

async function loadMe(){
  try{
    const initData = tg && tg.initData ? tg.initData : "";
    const userId = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "";
    const res = await fetch(`${API_ME}?init_data=${encodeURIComponent(initData)}&user_id=${encodeURIComponent(userId)}`);
    const data = await res.json();
    if (data && typeof data === "object"){
      meState = { ...meState, ...data };
      userIsPremium = !!data.is_premium;
    }
  }catch(e){}
}

function openTelegramPremium(){
  if (!premiumLink){
    showToast("Collega il premium link nel backend");
    return;
  }
  if (tg && tg.openTelegramLink) tg.openTelegramLink(premiumLink);
  else window.open(premiumLink, "_blank");
}

function hardDisableZoom(){
  document.addEventListener("gesturestart", e => e.preventDefault(), { passive: false });
  let lastTouchEnd = 0;
  document.addEventListener("touchend", e => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });
  document.addEventListener("wheel", e => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
}

function enrichItems(items){
  if (!Array.isArray(items) || !items.length) return [...fallbackRestaurants];
  return items.map((r, i) => ({
    ...r,
    image: r.image || fallbackRestaurants[i % fallbackRestaurants.length].image,
    note: r.note || r.notes || fallbackRestaurants[i % fallbackRestaurants.length].note,
    types: r.types || fallbackRestaurants[i % fallbackRestaurants.length].types
  }));
}

function restaurantCard(r){
  const payload = encodeURIComponent(JSON.stringify(r));
  return `
    <article class="restaurant">
      <div class="hero"><img src="${r.image}" alt="${escapeHtml(r.name)}" /></div>
      <div class="body">
        <div class="head">
          <h3 class="name">${escapeHtml(r.name)}</h3>
          <div class="score">${formatRating(r.rating)}<small>score</small></div>
        </div>
        <div class="meta">
          <span>📍 ${escapeHtml(r.city || "")}</span>
          <span>🍽 ${escapeHtml(r.types || "")}</span>
          <span>⭐ ${formatRating(r.rating)}</span>
        </div>
        <p class="desc">${escapeHtml(r.note || "")}</p>
        <div class="foot">
          <small>💬 Reviews • 🛡️ GF focus</small>
          <button class="cta detail-btn" data-payload="${payload}">Dettagli</button>
        </div>
      </div>
    </article>
  `;
}

function render(list){
  const box = byId("results");
  if (!box) return;
  box.innerHTML = list.length
    ? list.map(restaurantCard).join("")
    : `<div class="empty">Nessun ristorante trovato. Prova con un’altra parola chiave.</div>`;
}

function applyFilters(list){
  let data = [...list];
  if (currentCategory !== "all"){
    data = data.filter(r => (r.types || "").toLowerCase().includes(currentCategory.toLowerCase()));
  }
  data.sort((a, b) => sortDesc ? (b.rating || 0) - (a.rating || 0) : (a.rating || 0) - (b.rating || 0));
  return data;
}

function updateSummary(query, nearbyMode){
  if (byId("resultsTitle")) byId("resultsTitle").textContent = nearbyMode ? "Vicino a te" : "Risultati ricerca";
  if (byId("resultsSub")) byId("resultsSub").textContent = nearbyMode
    ? "Risultati ordinati per vicinanza, mantenendo lo stesso stile della mini app."
    : `Ricerca: ${query || "gluten free"}`;
}

async function search(query){
  const q = (query || "").trim();
  if (byId("results")) byId("results").innerHTML = `<div class="empty">Caricamento risultati…</div>`;
  updateSummary(q, false);

  try{
    const initData = tg && tg.initData ? tg.initData : "";
    const userId = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "";
    const res = await fetch(`${API_SEARCH}?q=${encodeURIComponent(q)}&init_data=${encodeURIComponent(initData)}&user_id=${encodeURIComponent(userId)}`);
    const data = await res.json();
    if (data.paywall){
      byId("premiumModal")?.classList.add("show");
      return;
    }
    render(applyFilters(enrichItems(data.items || data.restaurants || [])));
  }catch(e){
    render(applyFilters(enrichItems([])));
  }
}

async function searchNearby(){
  if (byId("results")) byId("results").innerHTML = `<div class="empty">Sto cercando i locali vicini a te…</div>`;
  updateSummary("", true);
  if (!navigator.geolocation){
    showToast("Geolocalizzazione non disponibile");
    render(applyFilters(enrichItems([])));
    return;
  }
  navigator.geolocation.getCurrentPosition(async (pos) => {
    try{
      const initData = tg && tg.initData ? tg.initData : "";
      const userId = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "";
      const res = await fetch(`${API_NEARBY}?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&radius_km=25&init_data=${encodeURIComponent(initData)}&user_id=${encodeURIComponent(userId)}`);
      const data = await res.json();
      if (data.paywall){
        byId("premiumModal")?.classList.add("show");
        return;
      }
      render(applyFilters(enrichItems(data.items || [])));
    }catch(e){
      render(applyFilters(enrichItems([])));
    }
  }, () => {
    showToast("Permesso posizione negato");
    render(applyFilters(enrichItems([])));
  }, { enableHighAccuracy: true, timeout: 12000 });
}

async function requirePremiumForDetails(restaurant){
  if (!userIsPremium){
    byId("premiumModal")?.classList.add("show");
    return;
  }
  const initData = tg && tg.initData ? tg.initData : "";
  const userId = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "";
  try{
    const res = await fetch(`${API_BASE}/api/restaurants/${restaurant.id}/details?init_data=${encodeURIComponent(initData)}&user_id=${encodeURIComponent(userId)}`);
    if (res.status === 403){
      byId("premiumModal")?.classList.add("show");
      return;
    }
    const data = await res.json();
    openDetailsModal(data.item || restaurant);
  }catch(e){
    showToast("Errore nel caricamento dettagli");
  }
}

function openDetailsModal(restaurant){
  const mapLink = restaurant.google_maps_url ? `<a href="${restaurant.google_maps_url}" target="_blank" rel="noopener">Apri Google Maps</a>` : `<span>Non disponibile</span>`;
  const phone = restaurant.phone ? `<a href="tel:${restaurant.phone}">${escapeHtml(restaurant.phone)}</a>` : `<span>Non disponibile</span>`;
  const website = restaurant.website ? `<a href="${restaurant.website}" target="_blank" rel="noopener">Visita sito</a>` : `<span>Non disponibile</span>`;
  const address = restaurant.address ? escapeHtml(restaurant.address) : "Non disponibile";
  if (byId("detailsTitle")) byId("detailsTitle").textContent = restaurant.name || "Dettagli ristorante";
  if (byId("detailsBody")){
    byId("detailsBody").innerHTML = `
      <p><strong>Città:</strong> ${escapeHtml(restaurant.city || "-")}</p>
      <p><strong>Indirizzo:</strong> ${address}</p>
      <p><strong>Categoria:</strong> ${escapeHtml(restaurant.types || "-")}</p>
      <p><strong>Rating:</strong> ${formatRating(restaurant.rating)}</p>
      <p><strong>Telefono:</strong> ${phone}</p>
      <p><strong>Sito web:</strong> ${website}</p>
      <p><strong>Google Maps:</strong> ${mapLink}</p>
      <p><strong>Recapito:</strong> ${address}</p>
    `;
  }
  byId("detailsModal")?.classList.add("show");
}

function bindEvents(){
  byId("backBtn")?.addEventListener("click", () => window.location.href = "index.html");
  byId("searchBtn")?.addEventListener("click", () => search((byId("searchInput")?.value || "")));
  byId("searchInput")?.addEventListener("keydown", e => { if (e.key === "Enter") search((byId("searchInput")?.value || "")); });
  qsa(".chip").forEach(btn => btn.addEventListener("click", () => {
    qsa(".chip").forEach(c => c.classList.remove("active"));
    btn.classList.add("active");
    currentCategory = btn.dataset.cat || "all";
    if (btn.id === "nearbyBtn") searchNearby();
    else search((byId("searchInput")?.value || initialQuery || "gluten free"));
  }));
  byId("sortBtn")?.addEventListener("click", () => {
    sortDesc = !sortDesc;
    byId("sortBtn").textContent = sortDesc ? "Top rated" : "Lowest rated";
    if (initialMode === "nearby") searchNearby();
    else search((byId("searchInput")?.value || initialQuery || "gluten free"));
  });
  byId("continuePremium")?.addEventListener("click", openTelegramPremium);
  byId("closePremiumModal")?.addEventListener("click", () => byId("premiumModal")?.classList.remove("show"));
  byId("closeDetailsModal")?.addEventListener("click", () => byId("detailsModal")?.classList.remove("show"));
  byId("premiumModal")?.addEventListener("click", e => { if (e.target.id === "premiumModal") byId("premiumModal")?.classList.remove("show"); });
  byId("detailsModal")?.addEventListener("click", e => { if (e.target.id === "detailsModal") byId("detailsModal")?.classList.remove("show"); });
  byId("results")?.addEventListener("click", e => {
    const btn = e.target.closest(".detail-btn");
    if (!btn) return;
    const payload = btn.dataset.payload;
    if (!payload) return;
    requirePremiumForDetails(JSON.parse(decodeURIComponent(payload)));
  });
}

function initSearchPage(){
  if (byId("searchInput")) byId("searchInput").value = initialQuery;
  bindEvents();
  hardDisableZoom();
  loadPremiumLink();
  loadQuotaStatus();
  loadMe();
  if (initialMode === "nearby") searchNearby();
  else search(initialQuery || "gluten free");

  if (tg){
    tg.ready();
    tg.expand();
    tg.setHeaderColor("#f4fbfa");
    tg.setBackgroundColor("#f4fbfa");
  }
}

if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", initSearchPage);
else initSearchPage();

</script>
</body>
</html>
