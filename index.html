<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GlutenFree Finder</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f6f7fb;
margin:0;
}

.header{
background:white;
padding:20px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
position:sticky;
top:0;
z-index:10;
}

.title{
font-size:22px;
font-weight:700;
}

.search{
margin-top:10px;
}

.search input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

.container{
padding:16px;
}

.card{
background:white;
padding:16px;
border-radius:14px;
margin-bottom:12px;
box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.name{
font-weight:700;
font-size:17px;
}

.city{
color:#666;
margin-top:4px;
}

.rating{
margin-top:6px;
}

.loading{
text-align:center;
padding:40px;
color:#777;
}

</style>
</head>

<body>

<div class="header">

<div class="title">
🌾 GlutenFree Finder
</div>

<div class="search">
<input id="search" placeholder="Cerca città o ristorante...">
</div>

</div>

<div class="container" id="list">

<div class="loading">
Caricamento ristoranti...
</div>

</div>

<script>

const API="https://glutenfree-bot-184042068933.europe-west1.run.app/api/restaurants"

let restaurants=[]

async function loadRestaurants(){

try{

const res=await fetch(API)

restaurants=await res.json()

render(restaurants)

}

catch(e){

document.getElementById("list").innerHTML=
"<div class='loading'>Errore caricamento dati</div>"

}

}

function render(data){

const list=document.getElementById("list")

list.innerHTML=""

data.forEach(r=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<div class="name">${r.name}</div>

<div class="city">📍 ${r.city}</div>

<div class="rating">⭐ ${r.rating ?? "n.d."}</div>

`

list.appendChild(card)

})

}

document.getElementById("search").addEventListener("input",e=>{

const q=e.target.value.toLowerCase()

const filtered=restaurants.filter(r=>

r.name.toLowerCase().includes(q) ||

r.city.toLowerCase().includes(q)

)

render(filtered)

})

loadRestaurants()

const tg=window.Telegram.WebApp

tg.expand()

</script>

</body>
</html>
