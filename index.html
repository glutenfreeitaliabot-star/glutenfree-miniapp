<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GlutenFree Finder</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f4f6fb;
margin:0;
}

.header{
background:white;
padding:20px;
box-shadow:0 2px 12px rgba(0,0,0,.06);
position:sticky;
top:0;
z-index:10;
}

.title{
font-size:24px;
font-weight:700;
}

.search{
margin-top:12px;
}

.search input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

.container{
padding:16px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:10px;
}

.btn{
background:white;
border-radius:14px;
padding:20px;
text-align:center;
font-size:16px;
font-weight:600;
box-shadow:0 4px 12px rgba(0,0,0,.05);
cursor:pointer;
transition:transform .15s ease;
}

.btn:active{
transform:scale(.97);
}

.section{
margin-top:26px;
}

.section-title{
font-size:18px;
font-weight:700;
margin-bottom:10px;
}

.card{
background:white;
border-radius:14px;
padding:16px;
margin-bottom:12px;
box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.name{
font-weight:700;
font-size:17px;
}

.city{
color:#666;
margin-top:4px;
}

.rating{
margin-top:6px;
}

</style>
</head>

<body>

<div class="header">

<div class="title">
🌾 GlutenFree Finder
</div>

<div class="search">
<input id="search" placeholder="Cerca città o ristorante...">
</div>

</div>

<div class="container">

<div class="grid">

<div class="btn" onclick="openSearch()">
🔍 Trova ristoranti
</div>

<div class="btn" onclick="nearby()">
📍 Vicino a me
</div>

<div class="btn" onclick="topRated()">
⭐ Migliori
</div>

<div class="btn" onclick="addRestaurant()">
➕ Aggiungi
</div>

</div>

<div class="section">

<div class="section-title">
🔥 Scelti dalla community
</div>

<div id="list"></div>

</div>

</div>

<script>

const API="https://glutenfree-bot-184042068933.europe-west1.run.app/api/restaurants"

let restaurants=[]

async function loadRestaurants(){

const res=await fetch(API)

restaurants=await res.json()

render(restaurants.slice(0,5))

}

function render(data){

const list=document.getElementById("list")

list.innerHTML=""

data.forEach(r=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<div class="name">${r.name}</div>

<div class="city">📍 ${r.city}</div>

<div class="rating">⭐ ${r.rating ?? "n.d."}</div>

`

list.appendChild(card)

})

}

function openSearch(){

render(restaurants)

}

function topRated(){

const sorted=[...restaurants].sort((a,b)=>(b.rating||0)-(a.rating||0))

render(sorted)

}

function nearby(){

alert("Funzione posizione in arrivo")

}

function addRestaurant(){

alert("Funzione aggiungi ristorante in arrivo")

}

loadRestaurants()

const tg=window.Telegram.WebApp

tg.expand()

</script>

</body>
</html>
