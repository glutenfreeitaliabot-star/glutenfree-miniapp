<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GlutenFree Finder</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#22c55e;
      --border:#e5e7eb;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .header{
      position:sticky;
      top:0;
      z-index:10;
      background:#fff;
      border-bottom:1px solid var(--border);
      padding:16px;
    }
    .title{
      font-size:22px;
      font-weight:700;
      margin-bottom:10px;
    }
    .search input{
      width:100%;
      padding:12px 14px;
      border:1px solid var(--border);
      border-radius:12px;
      font-size:16px;
      outline:none;
    }
    .container{
      padding:16px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:16px;
      margin-bottom:12px;
      box-shadow:0 4px 18px rgba(0,0,0,.05);
    }
    .name{
      font-size:18px;
      font-weight:700;
      margin-bottom:6px;
    }
    .city,.rating{
      color:var(--muted);
      font-size:15px;
      margin-top:4px;
    }
    .loading,.empty,.error{
      text-align:center;
      color:var(--muted);
      padding:32px 16px;
    }
    .error{
      color:#b91c1c;
    }
    .hint{
      font-size:13px;
      color:var(--muted);
      margin-top:8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">🌾 GlutenFree Finder</div>
    <div class="search">
      <input id="search" placeholder="Cerca città o ristorante..." />
    </div>
    <div class="hint">Mini App Telegram</div>
  </div>

  <div class="container" id="list">
    <div class="loading">Caricamento ristoranti...</div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (tg) tg.expand();

    const API = "https://INSERISCI-URL-CLOUD-RUN/api/restaurants";
    let restaurants = [];

    function render(data){
      const list = document.getElementById("list");
      list.innerHTML = "";

      if (!data.length){
        list.innerHTML = '<div class="empty">Nessun ristorante trovato.</div>';
        return;
      }

      data.forEach(r => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="name">${r.name ?? "Nome non disponibile"}</div>
          <div class="city">📍 ${r.city ?? "Città non disponibile"}</div>
          <div class="rating">⭐ ${r.rating ?? "n.d."}</div>
        `;
        list.appendChild(card);
      });
    }

    async function loadRestaurants(){
      const list = document.getElementById("list");

      if (API.includes("INSERISCI-URL-CLOUD-RUN")){
        list.innerHTML = `
          <div class="error">Mini App renderizzata correttamente ✅</div>
          <div class="empty">Adesso inserisci l'URL reale di Cloud Run nella variabile <b>API</b>.</div>
        `;
        return;
      }

      try{
        const res = await fetch(API);
        if (!res.ok) throw new Error("HTTP " + res.status);
        restaurants = await res.json();
        render(restaurants);
      } catch(err){
        list.innerHTML = `
          <div class="error">Errore nel caricamento dati</div>
          <div class="empty">${err.message}</div>
        `;
      }
    }

    document.getElementById("search").addEventListener("input", e => {
      const q = e.target.value.toLowerCase().trim();
      const filtered = restaurants.filter(r =>
        String(r.name || "").toLowerCase().includes(q) ||
        String(r.city || "").toLowerCase().includes(q)
      );
      render(filtered);
    });

    loadRestaurants();
  </script>
</body>
</html>
